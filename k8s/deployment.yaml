apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-world
  namespace: hello-world
  labels:
    app: hello-world
spec:
  replicas: 5
  selector:
    matchLabels:
      app: hello-world
  template:
    metadata:
      labels:
        app: hello-world
    spec:
      containers:
        - name: hello-world
          # CI pipeline substitui a tag a cada build
          image: ghcr.io/victoralbucorde/teste-github-actions:sha-2350f78
          ports:
            - containerPort: 8080
          env:
            - name: ENVIRONMENT
              value: production
            - name: APP_VERSION
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['app']
          resources:
            requests:
              cpu: "1024m"
              memory: "512Mi"
            limits:
              cpu: "2048m"
              memory: "1024Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
      securityContext:
        runAsNonRoot: true